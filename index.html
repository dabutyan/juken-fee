  .main {

    padding: 16px 16px 0;
  }

  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .step-card.active {

  }

  .step-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .step-badge {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .step-badge.active { background: var(--accent); color: var(--accent-fg); }
  .step-badge.done { background: var(--green-bg); color: var(--green-text); }
  .step-badge.inactive { background: var(--border); color: var(--text-tertiary); }

  .step-label { font-size: 13px; font-weight: 500; }
  .step-value { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  .chip-wrap {
    padding: 0 14px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    padding: 7px 13px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
    text-align: left;
    -webkit-tap-highlight-color: transparent;
  }

  .chip:active { transform: scale(0.97); }

  .chip.selected {
    background: var(--chip-selected-bg);
    color: var(--chip-selected-fg);
    border-color: var(--chip-selected-bg);
  }

    margin: 0 14px 14px;
    padding: 9px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.6;
    border-left: 3px solid var(--border-strong);

    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    margin-bottom: 12px;

    padding: 7px 0;

    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
    line-height: 1.5;
  }

    font-size: 13px;
    font-weight: 700;

    justify-content: space-between;

/* ---------- state ---------- */
var S = { step: 1, univ: null, method: null };

function resetSel() {
  sel = { picked: [], pair: {}, day: null, byDay: {}, counts: {}, byFac: {} };
  expanded = null;
}
resetSel();

/* ---------- helpers ---------- */
function fmt(n) { return '¥' + Number(n).toLocaleString('ja-JP'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return esc(s).replace(/'/g,'&#39;'); }
function facOf(label) { var m = String(label).match(/^[^（\s［【]+/); return m ? m[0] : String(label); }
function tierFee(tiers, idx) { return idx < tiers.length ? tiers[idx] : tiers[tiers.length - 1]; }
function curMethod() { return (S.univ && S.method) ? DB[S.univ].methods[S.method] : null; }
function facList(m) {
  if (Array.isArray(m.faculties)) return null;
  return Object.keys(m.faculties || {});
}

/* ---------- pricing engine ---------- */
/* items: [{label, fac, fixed?, base?}] → rows [{name, fee, base}] */
function priceItems(pricing, items) {
  pricing = pricing || { tiers: [0] };
  var per = {};
  function soloOf(it) {
    if (pricing.soloPrices) {
      for (var k in pricing.soloPrices) { if (String(it.label).indexOf(k) >= 0) return pricing.soloPrices[k]; }
    }
    return undefined;
  }
  var meta = items.map(function (it) {
    var tiers = (pricing.facultyTiers && pricing.facultyTiers[it.fac]) || pricing.tiers;
    var solo = soloOf(it);
    return { it: it, tiers: tiers, solo: solo, sticker: (solo !== undefined ? solo : tiers[0]) };
  });
  if (pricing.scope === 'global') {
    /* 定価の高い順を1出願目（=定価）とし、安い方を割引tierに回す。選択順に依存しない */
    var order = meta.map(function (m, i) { return i; }).sort(function (a, b) { return meta[b].sticker - meta[a].sticker; });
    var rank = {}; order.forEach(function (idx, r) { rank[idx] = r; });
    return meta.map(function (m, i) {
      if (m.it.fixed !== undefined) return { name: m.it.label, fee: m.it.fixed, base: m.sticker };
      var idx = rank[i];
      var fee = (idx === 0) ? m.sticker : tierFee(m.tiers, idx);
      return { name: m.it.label, fee: fee, base: m.sticker };
    });
  }
  return meta.map(function (m) {
    if (m.it.fixed !== undefined) return { name: m.it.label, fee: m.it.fixed, base: m.sticker };
    per[m.it.fac] = per[m.it.fac] || 0;
    var idx = per[m.it.fac]++;
    var fee = (idx === 0 && m.solo !== undefined) ? m.solo : tierFee(m.tiers, idx);
    return { name: m.it.label, fee: fee, base: m.sticker };
  });
}

/* 現在の選択 → 料金行 */
function buildRows(m) {
  var ui = m.ui || 'default';

  if (ui === 'default' || ui === 'variants' || ui === 'group') {
    var items = sel.picked.map(function (p) {
      var label = p.dept ? (p.fac + '（' + p.dept + '）') : p.fac;
      if (p.variant) label += '［' + p.variant + '］';
      return { label: label, fac: facOf(p.fac) };
    });
    return priceItems(m.pricing, items);
  }

  if (ui === 'count') {
    var rows = [];
    Object.keys(sel.counts).forEach(function (f) {
      var n = sel.counts[f] || 0;
      for (var i = 1; i <= n; i++) {
        rows.push({ name: f + '（' + i + '回目）', fee: m.pricing.tiers[0], base: m.pricing.tiers[0] });
      }
    });
    return rows;
  }

  if (ui === 'day') {
    var rows2 = [];
    (m.days || []).forEach(function (d) {
      var arr = sel.byDay[d] || [];
      arr.forEach(function (p, i) {
        rows2.push({ name: p.fac + '（' + p.dept + '）【' + d + '】', fee: tierFee(m.dayTiers, i), base: m.dayTiers[0] });
      });
    });
    return rows2;
  }

  if (ui === 'pair') {
    var rows3 = [];
    var counters = {};
    Object.keys(sel.pair).forEach(function (key) {
      var chosen = sel.pair[key];
      var parts = key.split('|'); var fac = parts[0], dept = parts[1];
      m.options.forEach(function (o) {
        if (!chosen[o.key]) return;
        var name = fac + '（' + dept + '）［' + o.label + '］';
        var fee, base;
        if (o.freeWith && chosen[o.freeWith]) {
          fee = 0;
          base = (o.fee !== undefined) ? o.fee : (o.tiers ? o.tiers[0] : 0);
          name += '（同時出願で0円）';
        } else if (o.tiers) {
          counters[o.key] = counters[o.key] || 0;
          fee = tierFee(o.tiers, counters[o.key]++);
          base = o.tiers[0];
        } else {
          fee = o.fee; base = o.fee;
        }
        rows3.push({ name: name, fee: fee, base: base });
      });
    });
    return rows3;
  }

  if (ui === 'facultyFlat') {
    var rows4 = []; var fi = 0;
    Object.keys(sel.byFac).forEach(function (f) {
      var depts = sel.byFac[f]; if (!depts || !depts.length) return;
      depts.forEach(function (d, i) {
        var fee = (i === 0) ? (fi === 0 ? m.flat.firstFee : m.flat.addFacultyFee) : 0;
        rows4.push({ name: f + '（' + d + '）' + (i > 0 ? '［追加無料🎉］' : ''), fee: fee, base: m.flat.firstFee });
      });
      fi++;
    });
    return rows4;
  }

  return [];
}

/* ---------- selection toggles ---------- */
function isPicked(fac, dept, variant) {
  return sel.picked.some(function (p) {
    return p.fac === fac && p.dept === dept && (variant === undefined || p.variant === variant);
  });
}
function togglePick(fac, dept, variant) {
  var m = curMethod();
  var idx = sel.picked.findIndex(function (p) { return p.fac === fac && p.dept === dept; });
  var wasSameVariant = idx >= 0 && sel.picked[idx].variant === variant;
  if (idx >= 0) sel.picked.splice(idx, 1);
  if (idx < 0 || !wasSameVariant) {
    /* group UI: singleOnly 学部は1学科のみ */
    if (m && m.ui === 'group' && m.rules && m.rules[fac] && m.rules[fac].singleOnly) {
      sel.picked = sel.picked.filter(function (p) { return p.fac !== fac; });
    }
    sel.picked.push({ fac: fac, dept: dept, variant: variant });
  }
  render();
}
function togglePair(fac, dept, opt) {
  var key = fac + '|' + dept;
  if (!sel.pair[key]) sel.pair[key] = {};
  sel.pair[key][opt] = !sel.pair[key][opt];
  var any = Object.keys(sel.pair[key]).some(function (k) { return sel.pair[key][k]; });
  if (!any) delete sel.pair[key];
  render();
}
function setCount(fac, n) {
  if (sel.counts[fac] === n) delete sel.counts[fac];
  else sel.counts[fac] = n;
  render();
}
function pickDay(d) {
  sel.day = (sel.day === d) ? null : d;
  expanded = null;
  render();
}
function toggleDayDept(fac, dept) {
  if (!sel.day) return;
  if (!sel.byDay[sel.day]) sel.byDay[sel.day] = [];
  var arr = sel.byDay[sel.day];
  var idx = arr.findIndex(function (p) { return p.fac === fac && p.dept === dept; });
  if (idx >= 0) arr.splice(idx, 1); else arr.push({ fac: fac, dept: dept });
  render();
}
function toggleFlatDept(fac, dept) {
  var m = curMethod();
  if (!sel.byFac[fac]) sel.byFac[fac] = [];
  var arr = sel.byFac[fac];
  var idx = arr.indexOf(dept);
  if (idx >= 0) arr.splice(idx, 1);
  else if (arr.length < (m.flat.maxPerFaculty || 99)) arr.push(dept);
  if (!arr.length) delete sel.byFac[fac];
  render();
}

/* ---------- navigation ---------- */
function selUniv(u) { S.univ = u; S.method = null; S.step = 2; resetSel(); render(); scrollToId('step2'); }
function selMethod(mName) { S.method = mName; S.step = 3; resetSel(); render(); scrollToId('step3'); }
function back1() { S = { step: 1, univ: null, method: null }; resetSel(); render(); window.scrollTo(0, 0); }
function back2() { S.method = null; S.step = 2; resetSel(); render(); scrollToId('step2'); }
function scrollToId(id) {
  setTimeout(function () { var el = document.getElementById(id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
}

/* ---------- cart ---------- */
function addToCart() {
  var m = curMethod(); if (!m) return;
  var rows = buildRows(m);
  if (!rows.length) return;
  var total = rows.reduce(function (s, r) { return s + r.fee; }, 0);
  var base = rows.reduce(function (s, r) { return s + r.base; }, 0);
  cart.push({ univ: S.univ, method: S.method, rows: rows, total: total, base: base });
  S = { step: 1, univ: null, method: null };
  resetSel();
  render();
  scrollToId('cart-section');
}
function removeCart(i) { cart.splice(i, 1); render(); }
function resetAll() { cart = []; S = { step: 1, univ: null, method: null }; resetSel(); render(); window.scrollTo(0, 0); }

function chipBtn(action, attrs, selected, label, disabled) {
  var a = '';
  Object.keys(attrs).forEach(function (k) { a += ' data-' + k + '="' + escA(attrs[k]) + '"'; });
  return '<button class="chip' + (selected ? ' selected' : '') + '"' +
    (disabled ? ' style="opacity:0.35;cursor:not-allowed;" data-action=""' : ' data-action="' + action + '"') +
    a + '><span style="line-height:1.5">' + label + '</span></button>';
}

function facHeader(fac, count, isExp, action) {
  var bg = isExp ? 'var(--accent)' : 'var(--bg)';
  var fg = isExp ? 'var(--accent-fg)' : 'var(--text)';
  var bd = isExp ? 'var(--accent)' : 'var(--border-strong)';
  return '<button data-action="' + action + '" data-fac="' + escA(fac) + '" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:' + bg + ';color:' + fg + ';border:1px solid ' + bd + ';border-radius:8px;font-size:13px;cursor:pointer;text-align:left;font-family:\'Noto Sans JP\',sans-serif;">' +
    '<span style="font-weight:500;">' + esc(fac) + '</span>' +
    '<span style="font-size:11px;opacity:0.8;">' + (count > 0 ? count + '件選択 ' : '') + (isExp ? '▲' : '▶') + '</span></button>';

    h += '<div style="font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px;">② 学部・学科を選ぶ（' + esc(d) + '）</div>';
    if (arr.length > 0) {
      h += '<div style="margin-bottom:10px;padding:8px 10px;background:var(--bg);border:1px solid var(--border-strong);border-radius:8px;font-size:11px;">';
      var dayTotal = 0;
      arr.forEach(function (p, i) {
        var fee = tierFee(m.dayTiers, i); dayTotal += fee;
        var lbl = (fee === 0) ? '<span style="color:#1B5E20;font-weight:700;">0円🎉</span>' : fmt(fee);
        h += '<div style="display:flex;justify-content:space-between;padding:3px 0;"><span>' + (i + 1) + '. ' + esc(p.fac + '（' + p.dept + '）') + '</span><span>' + lbl + '</span></div>';
      });
      h += '<div style="display:flex;justify-content:space-between;font-weight:700;border-top:1px solid var(--border);margin-top:6px;padding-top:6px;"><span>' + esc(d) + ' 小計</span><span>' + fmt(dayTotal) + '</span></div></div>';
    }
    Object.keys(m.faculties).forEach(function (fac) {
      var depts = m.faculties[fac];
      var isExp = expanded === fac;
      var cnt = depts.filter(function (dd) { return arr.some(function (p) { return p.fac === fac && p.dept === dd; }); }).length;
      h += '<div style="margin-bottom:8px;">' + facHeader(fac, cnt, isExp, 'expand');
      if (isExp) {
        h += '<div class="chip-wrap" style="padding:10px 0 0 8px;">';
        depts.forEach(function (dd) {
          var on = arr.some(function (p) { return p.fac === fac && p.dept === dd; });
          h += chipBtn('dayDept', { fac: fac, dept: dd }, on, esc(dd));
        });
        h += '</div>';
      }
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}

function renderCount(m) {
  var h = '<div style="padding:0 14px 14px;">';
  Object.keys(m.faculties).forEach(function (fac) {
    var max = (m.counts && m.counts[fac]) || 4;
    var n = sel.counts[fac] || 0;
    h += '<div style="margin-bottom:8px;padding:10px 12px;background:var(--bg);border:1px solid ' + (n > 0 ? 'var(--accent)' : 'var(--border)') + ';border-radius:8px;">';
    h += '<div style="font-size:12px;font-weight:500;margin-bottom:4px;">' + esc(fac) + '<span style="font-size:10px;color:var(--text-tertiary);margin-left:6px;">最大' + max + '回</span></div>';
    h += '<div style="font-size:10px;color:var(--text-tertiary);margin-bottom:8px;line-height:1.5;">' + esc(m.faculties[fac].join('・')) + '</div>';
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
    for (var i = 1; i <= max; i++) {
      h += chipBtn('count', { fac: fac, n: String(i) }, n === i, i + '回');
    }
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

function renderFacultyFlat(m) {
  var h = '<div style="padding:0 14px 14px;">';
  if (m.banner) h += bannerHtml(esc(m.banner));
  var selFacs = Object.keys(sel.byFac).filter(function (f) { return sel.byFac[f] && sel.byFac[f].length; });
  Object.keys(m.faculties).forEach(function (fac) {
    var depts = m.faculties[fac];
    var isExp = expanded === fac;
    var picked = sel.byFac[fac] || [];
    var fi = selFacs.indexOf(fac);
    var feeLabel = picked.length > 0 ? (fi === 0 ? fmt(m.flat.firstFee) : '+' + fmt(m.flat.addFacultyFee)) : '';
    var bg = isExp ? 'var(--accent)' : (picked.length > 0 ? '#EBF5EC' : 'var(--bg)');
    var fg = isExp ? 'var(--accent-fg)' : 'var(--text)';
    var bd = isExp ? 'var(--accent)' : (picked.length > 0 ? '#81C784' : 'var(--border-strong)');
    h += '<div style="margin-bottom:8px;">';
    h += '<button data-action="expand" data-fac="' + escA(fac) + '" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:' + bg + ';color:' + fg + ';border:1px solid ' + bd + ';border-radius:8px;font-size:13px;cursor:pointer;text-align:left;font-family:\'Noto Sans JP\',sans-serif;">';
    h += '<span style="font-weight:500;">' + esc(fac) + '</span>';
    h += '<span style="font-size:11px;opacity:0.8;">' + (picked.length > 0 ? picked.length + '学科 ' + feeLabel + ' ' : '') + (isExp ? '▲' : '▶') + '</span></button>';
    if (isExp) {
      h += '<div style="padding:8px 8px 0;"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;">最大' + m.flat.maxPerFaculty + '学科まで選択可（同一学部内は追加無料）</div>';
      h += '<div class="chip-wrap" style="padding:0;">';
      depts.forEach(function (d) {
        var on = picked.indexOf(d) >= 0;
        var disabled = !on && picked.length >= m.flat.maxPerFaculty;
        h += chipBtn('flatDept', { fac: fac, dept: d }, on, esc(d) + (on && picked.indexOf(d) > 0 ? ' 🎉' : ''), disabled);
      });
      h += '</div></div>';
    }
    h += '</div>';
  });
  h += '</div>';
  return h;
}

/* --- step cards --- */
function render() {
  var html = '';

  /* STEP 1 */
  html += '<div class="step-card' + (S.step === 1 ? ' active' : '') + '" id="step1">';
  html += '<div class="step-header"><div class="step-badge ' + (S.univ ? 'done' : 'active') + '">' + (S.univ ? '✓' : '1') + '</div>';
  html += '<div><div class="step-label">大学を選ぶ</div>' + (S.univ ? '<div class="step-value">' + esc(S.univ) + '</div>' : '') + '</div></div>';
  if (!S.univ) {
    GROUPS.forEach(function (g) {
      html += '<div style="padding:0 14px 12px;"><div class="group-label">' + g.label + '</div><div style="display:flex;flex-wrap:wrap;gap:7px;">';
      g.univs.forEach(function (u) {
        if (DB[u]) html += chipBtn('univ', { univ: u }, false, esc(u));
      });
      html += '</div></div>';
    });
  } else {
    html += '<div style="padding:0 14px 14px;"><button class="chip" data-action="back1">↩ 大学を選び直す</button></div>';
  }
  html += '</div>';

  /* STEP 2 */
  if (S.univ) {
    html += '<div class="step-card' + (S.step === 2 ? ' active' : '') + '" id="step2">';
    html += '<div class="step-header"><div class="step-badge ' + (S.method ? 'done' : 'active') + '">' + (S.method ? '✓' : '2') + '</div>';
    html += '<div><div class="step-label">入試方式を選ぶ</div>' + (S.method ? '<div class="step-value">' + esc(S.method) + '</div>' : '') + '</div></div>';
    if (!S.method) {
      html += '<div class="chip-wrap">';
      Object.keys(DB[S.univ].methods).forEach(function (mName) {
        html += chipBtn('method', { method: mName }, false, esc(mName));
      });
      html += '</div>';
      html += '<div style="padding:0 14px 14px;"><button class="chip" data-action="back1">↩ 大学を選び直す</button></div>';
    } else {
      html += '<div style="padding:0 14px 14px;"><button class="chip" data-action="back2">↩ 方式を選び直す</button></div>';
    }
    html += '</div>';
  }

  /* STEP 3 */
  if (S.univ && S.method) {
    var m = curMethod();
    var rows = buildRows(m);
    html += '<div class="step-card active" id="step3">';
    html += '<div class="step-header"><div class="step-badge ' + (rows.length ? 'done' : 'active') + '">' + (rows.length ? '✓' : '3') + '</div>';
    html += '<div><div class="step-label">学部・学科を選ぶ</div>' + (rows.length ? '<div class="step-value">' + rows.length + '件選択中</div>' : '') + '</div></div>';
    if (m.note) html += '<div class="note-bar">' + esc(m.note) + '</div>';

    var ui = m.ui || 'default';
    if (ui === 'variants') html += renderVariants(m);
    else if (ui === 'pair') html += renderPair(m);
    else if (ui === 'day') html += renderDay(m);
    else if (ui === 'count') html += renderCount(m);
    else if (ui === 'facultyFlat') html += renderFacultyFlat(m);
    else html += renderDefault(m);

    if (rows.length) {
      var total = rows.reduce(function (s, r) { return s + r.fee; }, 0);
      html += '<div style="margin:0 14px 12px;padding:10px 12px;background:var(--bg);border:1px solid var(--border-strong);border-radius:8px;">';
      rows.forEach(function (r) {
        html += '<div style="display:flex;justify-content:space-between;gap:10px;padding:3px 0;font-size:11px;"><span style="color:var(--text-secondary);">' + esc(r.name) + '</span><span style="font-weight:700;white-space:nowrap;font-family:\'DM Mono\',monospace;">' + (r.fee === 0 ? '<span style="color:#1B5E20;">¥0🎉</span>' : fmt(r.fee)) + '</span></div>';
      });
      html += '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;border-top:1px solid var(--border);margin-top:6px;padding-top:6px;"><span>小計</span><span style="font-family:\'DM Mono\',monospace;">' + fmt(total) + '</span></div></div>';
      html += '<div style="padding:0 14px 14px;"><button data-action="addToCart" style="width:100%;padding:14px;background:var(--accent);color:var(--accent-fg);border:none;border-radius:var(--radius);font-size:14px;font-family:\'Noto Sans JP\',sans-serif;font-weight:700;cursor:pointer;">+ 受験リストに追加する</button></div>';
    }
    html += '</div>';
  }

  /* CART */
  if (cart.length) {
    var grand = 0, grandBase = 0;
    html += '<div class="result-card" id="cart-section">';
    html += '<div class="result-header">🎓 受験リスト（合計）</div><div class="result-body">';
    cart.forEach(function (c, i) {
      grand += c.total; grandBase += c.base;
      html += '<div style="margin-bottom:12px;padding:10px 12px;background:var(--bg);border-radius:8px;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
      html += '<div style="font-size:12px;font-weight:700;">' + esc(c.univ) + '<span style="font-weight:400;color:var(--text-secondary);font-size:11px;"> / ' + esc(c.method) + '</span></div>';
      html += '<button data-action="removeCart" data-idx="' + i + '" style="background:none;border:none;color:var(--text-tertiary);font-size:13px;cursor:pointer;padding:2px 6px;">✕</button></div>';
      c.rows.forEach(function (r) {
        html += '<div class="result-row"><div class="result-row-label">' + esc(r.name) + '</div><div class="result-row-price">' + (r.fee === 0 ? '<span style="color:#1B5E20;">¥0</span>' : fmt(r.fee)) + '</div></div>';
      });
      html += '<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;padding-top:6px;"><span>小計</span><span style="font-family:\'DM Mono\',monospace;">' + fmt(c.total) + '</span></div>';
      html += '</div>';
    });
    html += '<div class="result-total"><div class="result-total-label">受験料合計</div><div class="result-total-price">' + fmt(grand) + '</div></div>';
    var savings = grandBase - grand;
    if (savings > 0) {
      html += '<div class="savings-bar">💰 割引で ' + fmt(savings) + ' おトクになっています！</div>';
    }
    html += '</div></div>';
    html += '<button data-action="resetAll" class="reset-btn">↩ 全部リセット</button>';
    html += '<div style="margin-bottom:12px;padding:14px 16px;background:#06C755;border-radius:var(--radius);text-align:center;">';
    html += '<p style="font-size:12px;color:#fff;margin-bottom:8px;font-weight:500;">📅 製品版で日程管理・書類チェックも！</p>';
    html += '<a href="https://lin.ee/R0rwEwt" target="_blank" style="display:inline-block;"><img src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png" alt="友だち追加" height="36" style="border:none;"></a></div>';
  }

  document.getElementById('app').innerHTML = html;
}

/* ---------- events ---------- */
document.addEventListener('click', function (e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var a = btn.getAttribute('data-action');
  var d = btn.dataset;
  if (a === 'univ') selUniv(d.univ);
  else if (a === 'method') selMethod(d.method);
  else if (a === 'back1') back1();
  else if (a === 'back2') back2();
  else if (a === 'expand') { expanded = (expanded === d.fac) ? null : d.fac; render(); }
  else if (a === 'pick') togglePick(d.fac, d.dept);
  else if (a === 'variant') togglePick(d.fac, d.dept, d.variant);
  else if (a === 'pairOpt') togglePair(d.fac, d.dept, d.opt);
  else if (a === 'count') setCount(d.fac, parseInt(d.n, 10));
  else if (a === 'day') pickDay(d.day);
  else if (a === 'dayDept') toggleDayDept(d.fac, d.dept);
  else if (a === 'flatDept') toggleFlatDept(d.fac, d.dept);
  else if (a === 'addToCart') addToCart();
  else if (a === 'removeCart') removeCart(parseInt(d.idx, 10));
  else if (a === 'resetAll') resetAll();
});

render();

</script>
</body>
</html>
